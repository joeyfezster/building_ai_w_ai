name: Publish Subtrees

on:
  push:
    branches: [main]
    paths:
      - "packages/**"

jobs:
  publish-pr-review-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve review-prompts symlink and commit
        run: |
          # Replace the symlink with real files so the standalone repo is self-contained
          # subtree split operates on committed history, so we must commit the resolved files
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm packages/pr-review-pack/review-prompts
          cp -r packages/review-prompts/ packages/pr-review-pack/review-prompts/
          git add packages/pr-review-pack/review-prompts/
          git commit -m "temp: resolve review-prompts symlink for subtree split"

      - name: Rewrite paths for standalone context
        run: |
          cd packages/pr-review-pack

          # Rule 1: Strip self-referencing monorepo prefix (handles all current and future paths)
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i 's|packages/pr-review-pack/||g' {} +

          # Rule 2: Cross-references to sibling packages → standalone repo URLs
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i \
              -e 's|packages/dark-factory/|https://github.com/joeyfezster/dark-factory/tree/main/|g' \
              -e 's|packages/review-prompts/|review-prompts/|g' {} +

          # Rule 2b: Skill install paths → local root
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i 's|\.claude/skills/pr-review-pack/||g' {} +

          # Special cases: remove monorepo-only context lines
          [ -f SKILL.md ] && sed -i '/From the monorepo root, these resolve to/d' SKILL.md
          [ -f SKILL.md ] && sed -i 's|Repository: `joeyfezster/building_ai_w_ai`|Repository: your project repository|g' SKILL.md

          cd ../..

      - name: Verify no stale monorepo paths
        run: |
          cd packages/pr-review-pack
          # Match skill paths WITH trailing slash (monorepo internal refs).
          # Clone targets like ".claude/skills/pr-review-pack" (no slash) are valid.
          STALE=$(grep -rn \
            -e "packages/dark-factory" \
            -e "packages/pr-review-pack" \
            -e "packages/review-prompts" \
            -e "\.claude/skills/pr-review-pack/" \
            --include="*.md" --include="*.py" --include="*.yaml" --include="*.yml" \
            . 2>/dev/null | grep -v "CONTRIBUTING.md" || true)
          if [ -n "$STALE" ]; then
            echo "ERROR: Stale monorepo paths found after rewrite:"
            echo "$STALE"
            echo ""
            echo "Fix: add a rewrite rule in publish-subtrees.yml or update the source file."
            exit 1
          fi
          echo "OK: no stale monorepo paths found."

      - name: Commit publish transforms
        run: |
          git add packages/pr-review-pack/
          git diff --staged --quiet || git commit --amend --no-edit

      - name: Split subtree
        run: git subtree split --prefix packages/pr-review-pack -b subtree-pr-review-pack

      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.PR_REVIEW_PACK_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Push to standalone repo
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key"
        run: |
          git remote add pr-review-pack git@github.com:joeyfezster/pr-review-pack.git || true
          git fetch pr-review-pack main || true
          git push pr-review-pack subtree-pr-review-pack:main --force-with-lease

      - name: Clean up
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          git branch -D subtree-pr-review-pack || true

  publish-dark-factory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve review-prompts symlink and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm packages/dark-factory/review-prompts
          cp -r packages/review-prompts/ packages/dark-factory/review-prompts/
          git add packages/dark-factory/review-prompts/
          git commit -m "temp: resolve review-prompts symlink for subtree split"

      - name: Rewrite paths for standalone context
        run: |
          cd packages/dark-factory

          # Rule 1: Strip self-referencing monorepo prefix (handles all current and future paths)
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i 's|packages/dark-factory/||g' {} +

          # Rule 2: Cross-references to sibling packages → standalone repo URLs
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i \
              -e 's|packages/pr-review-pack/|https://github.com/joeyfezster/pr-review-pack/tree/main/|g' \
              -e 's|packages/review-prompts/|review-prompts/|g' {} +

          # Rule 2b: Skill install paths → local root
          find . -type f \( -name "*.md" -o -name "*.py" -o -name "*.yaml" -o -name "*.yml" \) \
            -not -path './.git/*' -exec \
            sed -i 's|\.claude/skills/factory-orchestrate/||g' {} +

          # Special cases: remove monorepo-only context lines
          [ -f SKILL.md ] && sed -i '/From the monorepo root, these resolve to/d' SKILL.md
          [ -f SKILL.md ] && sed -i 's|Repository: `joeyfezster/building_ai_w_ai`|Repository: your project repository|g' SKILL.md

          cd ../..

      - name: Verify no stale monorepo paths
        run: |
          cd packages/dark-factory
          # Match skill paths WITH trailing slash (monorepo internal refs).
          # Clone targets like ".claude/skills/factory-orchestrate" (no slash) are valid.
          STALE=$(grep -rn \
            -e "packages/dark-factory" \
            -e "packages/pr-review-pack" \
            -e "packages/review-prompts" \
            -e "\.claude/skills/factory-orchestrate/" \
            --include="*.md" --include="*.py" --include="*.yaml" --include="*.yml" \
            . 2>/dev/null | grep -v "CONTRIBUTING.md" || true)
          if [ -n "$STALE" ]; then
            echo "ERROR: Stale monorepo paths found after rewrite:"
            echo "$STALE"
            echo ""
            echo "Fix: add a rewrite rule in publish-subtrees.yml or update the source file."
            exit 1
          fi
          echo "OK: no stale monorepo paths found."

      - name: Commit publish transforms
        run: |
          git add packages/dark-factory/
          git diff --staged --quiet || git commit --amend --no-edit

      - name: Split subtree
        run: git subtree split --prefix packages/dark-factory -b subtree-dark-factory

      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.DARK_FACTORY_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Push to standalone repo
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/deploy_key"
        run: |
          git remote add dark-factory git@github.com:joeyfezster/dark-factory.git || true
          git fetch dark-factory main || true
          git push dark-factory subtree-dark-factory:main --force-with-lease

      - name: Clean up
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          git branch -D subtree-dark-factory || true

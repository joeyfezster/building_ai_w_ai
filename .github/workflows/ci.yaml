name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"
      - "packages/review-prompts/**"
      - ".claude/skills/pr-review-pack/references/**"
      - ".claude/skills/pr-review-pack/assets/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "**/*.md"
      - "packages/review-prompts/**"
      - ".claude/skills/pr-review-pack/references/**"
      - ".claude/skills/pr-review-pack/assets/**"

jobs:
  # ── Product Code Validation ─────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: docker build -f infra/docker/Dockerfile.train --build-arg BASE_IMAGE=python:3.12-slim -t minipong-train .
      - run: docker run --rm minipong-train python -m src.train.train_dqn --help

  # ── Factory Infrastructure Validation ───────────────────────
  # Tests the factory's own components — the validation system
  # must itself be validated, or it can't be trusted.
  factory-self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install pytest

      # Lint factory scripts
      - name: Lint factory scripts
        run: |
          pip install ruff
          ruff check ./packages/dark-factory/scripts/run_scenarios.py ./packages/dark-factory/scripts/compile_feedback.py

      # Type-check factory scripts
      - name: Type-check factory scripts
        run: |
          pip install mypy
          mypy ./packages/dark-factory/scripts/run_scenarios.py ./packages/dark-factory/scripts/compile_feedback.py --ignore-missing-imports

      # Run factory component tests
      - name: Test scenario runner
        run: pytest tests/test_factory_run_scenarios.py -v

      - name: Test feedback compiler
        run: pytest tests/test_factory_compile_feedback.py -v

      # Verify scenario format consistency
      - name: Validate scenario file format
        run: |
          python -c "
          from pathlib import Path
          import re
          import sys

          required_sections = [
              'Category', 'Preconditions', 'Behavioral Expectation',
              'Evaluation Method', 'Pass Criteria', 'Evidence Required'
          ]

          errors = []
          for f in sorted(Path('scenarios').glob('*.md')):
              content = f.read_text()
              for section in required_sections:
                  if f'## {section}' not in content:
                      errors.append(f'{f.name}: missing ## {section}')
              # Verify evaluation method has a code block
              if '\`\`\`bash' not in content and '\`\`\`sh' not in content:
                  errors.append(f'{f.name}: no bash code block in Evaluation Method')

          if errors:
              print('Scenario format errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print(f'All {len(list(Path(\"scenarios\").glob(\"*.md\")))} scenarios have valid format')
          "

      # Verify factory-protected files list is consistent
      - name: Verify factory-protected files referenced correctly
        run: |
          python -c "
          from pathlib import Path
          import sys

          # These files must exist and be referenced in both
          # CLAUDE.md and factory_fix.md as protected
          protected_dirs = ['scenarios', 'packages/dark-factory/scripts', 'agents', 'specs']
          protected_files = [
              '.github/workflows/factory.yaml',
              'packages/dark-factory/prompts/factory_fix.md',
              'CLAUDE.md',
          ]

          errors = []
          for d in protected_dirs:
              if not Path(d).exists():
                  errors.append(f'Protected dir {d}/ does not exist')

          for f in protected_files:
              if not Path(f).exists():
                  errors.append(f'Protected file {f} does not exist')

          # Check CLAUDE.md references them
          claude_md = Path('CLAUDE.md').read_text()
          for d in protected_dirs:
              if f'/{d}/' not in claude_md:
                  errors.append(f'CLAUDE.md does not reference /{d}/')

          if errors:
              print('Factory integrity errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('Factory integrity check passed')
          "

      # Anti-gaming test quality check
      - name: Check test quality (anti-vacuous, anti-gaming)
        run: python ./packages/dark-factory/scripts/check_test_quality.py

  # ── pr-review-pack Skill Check ──────────────────────────────
  # Validates the pr-review-pack skill itself: the live-pack-validation
  # spec must declare every failure code in the registry, and every
  # registered code must be exercised by the spec. Also runs the per-code
  # fault-injection regression tests.
  pr-review-pack-skill-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pr-review-pack
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r ../../requirements.txt -r ../../requirements-dev.txt
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Build the renderer fixtures so renderer-fixtures can run.
      - name: Generate renderer fixtures
        run: python3 scripts/dev/generate_fixtures.py

      # Renderer regression suite — fixture-bound.
      - name: Renderer fixtures (Playwright)
        run: npx playwright test --project=renderer-fixtures

      # Failure-code registry parity: every code in the spec must be in
      # the registry, and vice versa. The grep matches single-quoted,
      # double-quoted, and backtick-quoted code literals so a future
      # contributor cannot bypass parity by switching quote style.
      - name: Failure-code registry parity
        run: |
          set -eo pipefail
          SPEC=e2e/live-pack-validation.spec.ts
          REG=references/live-pack-failure-codes.md
          spec_codes=$(grep -oE "liveFail\(\s*['\"\`][a-z][a-z0-9-]*['\"\`]" "$SPEC" \
            | sed -E "s/.*['\"\`]([a-z0-9-]+)['\"\`].*/\1/" | sort -u)
          reg_codes=$(grep -E "^\| \`[a-z][a-z0-9-]*\` \|" "$REG" \
            | sed -E 's/^\| `([a-z0-9-]+)`.*/\1/' | sort -u)
          # Sanity guard: empty extraction means the regex broke and the
          # parity check would silently pass. Fail loudly instead.
          if [ -z "$spec_codes" ]; then
            echo "ERROR: spec_codes extraction was empty — parity check broken."
            echo "Inspect the regex against $SPEC."
            exit 1
          fi
          if [ -z "$reg_codes" ]; then
            echo "ERROR: reg_codes extraction was empty — parity check broken."
            echo "Inspect the regex against $REG."
            exit 1
          fi
          if [ "$spec_codes" != "$reg_codes" ]; then
            echo "Failure-code registry mismatch."
            echo ""
            echo "Spec codes:"
            echo "$spec_codes"
            echo ""
            echo "Registry codes:"
            echo "$reg_codes"
            echo ""
            echo "Diff (spec vs registry):"
            diff <(echo "$spec_codes") <(echo "$reg_codes") || true
            exit 1
          fi

      # Per-code fault-injection regression tests.
      - name: Fault-injection regression tests
        run: pytest tests/live_pack_validation/ -v

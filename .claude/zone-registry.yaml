zones:
  environment:
    paths: ["src/envs/**"]
    specs: ["specs/env.md"]
    category: product
    label: "Environment"
    sublabel: "MiniPong Gymnasium env"
  rl-core:
    paths: ["src/rl/**"]
    specs: ["specs/rl.md"]
    category: product
    label: "RL Core"
    sublabel: "DQN algorithm components"
  agent:
    paths: ["src/agents/**"]
    specs: ["specs/rl.md"]
    category: product
    label: "Agent"
    sublabel: "DQN agent"
  training:
    paths: ["src/train/**"]
    specs: ["specs/training.md", "specs/proof.md"]
    category: product
    label: "Training"
    sublabel: "Pipeline, eval, video, verification"
  observability:
    paths: ["src/obs/**"]
    specs: []
    category: product
    label: "Observability"
    sublabel: "Logging, metrics"
  dashboard:
    paths: ["src/dashboard/**"]
    specs: ["specs/dashboard.md"]
    category: product
    label: "Dashboard"
    sublabel: "Streamlit training dashboard"
  tests:
    paths: ["tests/**"]
    specs: []
    category: product
    label: "Tests"
    sublabel: "pytest suite"
  config:
    paths: ["configs/**", "pyproject.toml", "Makefile", "requirements*.in", "requirements*.txt"]
    specs: []
    category: infra
    label: "Config"
    sublabel: "Build, deps, project config"
  repo-infra:
    paths: [".github/**", ".claude/skills/**", ".claude/zone-registry.yaml", "docs/proposals/**", "docs/factory_validation_strategy.md", "CLAUDE.md"]
    specs: []
    category: factory
    label: "Repo Infra"
    sublabel: "CI workflows, zone registry, project-level config"
  repo-scripts:
    paths: ["scripts/**"]
    specs: []
    category: infra
    label: "Repo Scripts"
    sublabel: "Utility scripts (whitepapers, packaging, postmerge)"
  docker:
    paths: ["infra/**", ".devcontainer/**"]
    specs: []
    category: infra
    label: "Docker/Infra"
    sublabel: "Containers, compute"
  review-pack:
    paths: ["packages/pr-review-pack/**", "docs/pr*_review_pack.html", "docs/pr*_diff_data.json"]
    specs: ["packages/pr-review-pack/references/build-spec.md"]
    category: factory
    label: "Review Pack"
    sublabel: "PR review pack skill (template, renderer, scaffold, CLI, tests)"
  review-prompts:
    paths: ["packages/review-prompts/**"]
    # No separate specs — the prompt files themselves define the review paradigms.
    specs: []
    category: factory
    label: "Review Prompts"
    sublabel: "Gate 0 Tier 2 paradigm prompts"
  dark-factory:
    paths: ["packages/dark-factory/**", "artifacts/factory/**"]
    specs: ["packages/dark-factory/docs/dark_factory.md"]
    category: factory
    label: "Dark Factory"
    sublabel: "Factory convergence loop, gate artifacts"
  docs:
    paths: ["docs/*.md", "docs/*.html", "docs/*.py", "docs/decisions/**", "docs/whitepapers/**"]
    specs: []
    category: infra
    label: "Documentation"
    sublabel: "Project docs, decisions, whitepapers"
  specs:
    paths: ["specs/**", "scenarios/**"]
    specs: []
    category: factory
    label: "Specs & Scenarios"
    sublabel: "Component specs and holdout evaluation criteria"
  play:
    paths: ["src/play/**"]
    specs: []
    category: product
    label: "Interactive Play"
    sublabel: "Human vs agent gameplay"
